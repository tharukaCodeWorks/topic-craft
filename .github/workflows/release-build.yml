name: Build and Release

on:
  release:
    types: [published]

jobs:
  build-mac:
    name: Build macOS
    runs-on: [self-hosted, Tharukas-Mac-mini]
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Build macOS Application
        run: npm run package -- --mac
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Version
        shell: bash
        run: echo "APP_VERSION=${TAG_NAME#v}" >> $GITHUB_ENV
        env:
          TAG_NAME: ${{ github.event.release.tag_name }}

      - name: Upload macOS Artifacts
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ github.event.release.upload_url }}
          asset_path: ./release/build/TopicCraft-${{ env.APP_VERSION }}-mac.zip
          asset_name: TopicCraft-${{ github.event.release.tag_name }}-mac.zip
          asset_content_type: application/zip

      - name: Upload macOS DMG Artifacts
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ github.event.release.upload_url }}
          asset_path: ./release/build/TopicCraft-${{ env.APP_VERSION }}.dmg
          asset_name: TopicCraft-${{ github.event.release.tag_name }}.dmg
          asset_content_type: application/x-apple-diskimage

  build-windows:
    name: Build Windows
    runs-on: windows-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Build Windows Application
        run: npm run package -- --win
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Version
        shell: bash
        run: echo "APP_VERSION=${TAG_NAME#v}" >> $GITHUB_ENV
        env:
          TAG_NAME: ${{ github.event.release.tag_name }}

      - name: Upload Windows Artifacts
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ github.event.release.upload_url }}
          asset_path: ./release/build/TopicCraft Setup ${{ env.APP_VERSION }}.exe
          asset_name: TopicCraft-Setup-${{ github.event.release.tag_name }}.exe
          asset_content_type: application/vnd.microsoft.portable-executable

  build-linux:
    name: Build Linux
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Build Linux Application
        run: npm run package -- --linux
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Version
        shell: bash
        run: echo "APP_VERSION=${TAG_NAME#v}" >> $GITHUB_ENV
        env:
          TAG_NAME: ${{ github.event.release.tag_name }}

      - name: Upload Linux AppImage Artifact
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ github.event.release.upload_url }}
          asset_path: ./release/build/TopicCraft-${{ env.APP_VERSION }}.AppImage
          asset_name: TopicCraft-${{ github.event.release.tag_name }}.AppImage
          asset_content_type: application/x-executable
